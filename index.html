<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI TTS 음성 변환기</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  background:linear-gradient(135deg,#e3f2fd,#fce4ec);
  font-family:Arial,sans-serif;
}

.container{
  width:min(900px,92%);
  margin:40px auto;
  background:white;
  border-radius:24px;
  padding:28px;
  box-shadow:0 15px 35px rgba(0,0,0,.15);
}

h1{
  text-align:center;
}

.subtitle{
  text-align:center;
  color:#666;
  margin-bottom:20px;
}

.login-box{
  text-align:center;
  margin-bottom:20px;
}

.user-info{
  margin-top:10px;
  font-size:14px;
}

textarea{
  width:100%;
  min-height:180px;
  padding:15px;
  border:1px solid #ddd;
  border-radius:12px;
  font-size:16px;
}

.option-box{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
  margin-top:15px;
}

select,input{
  height:45px;
  border:1px solid #ddd;
  border-radius:12px;
  padding:0 10px;
}

button{
  border:none;
  border-radius:12px;
  height:45px;
  padding:0 15px;
  cursor:pointer;
  font-weight:bold;
}

.login-btn{
  background:#4285f4;
  color:white;
}

.logout-btn{
  background:#ef5350;
  color:white;
}

.make-btn{
  background:#42a5f5;
  color:white;
}

.history-btn{
  background:#66bb6a;
  color:white;
}

.button-row{
  display:flex;
  gap:10px;
  margin-top:15px;
  flex-wrap:wrap;
}

.status{
  margin-top:15px;
}

audio{
  width:100%;
  margin-top:20px;
}

.history{
  margin-top:30px;
}

.item{
  padding:15px;
  border-radius:12px;
  background:#f7f7f7;
  margin-bottom:10px;
}

.item-date{
  color:#888;
  font-size:12px;
}

</style>
</head>

<body>

<div class="container">

<h1>AI TTS 음성 변환기</h1>

<div class="subtitle">
Firebase 로그인 + OpenAI TTS + Firebase 저장
</div>

<div class="login-box">

<button
class="login-btn"
onclick="login()">
구글 로그인
</button>

<button
class="logout-btn"
onclick="logout()">
로그아웃
</button>

<div id="userInfo" class="user-info">
로그인 필요
</div>

</div>

<textarea
id="textInput"
placeholder="텍스트를 입력하세요">
</textarea>

<div class="option-box">

<select id="modelSelect">
<option value="tts-1">tts-1</option>
<option value="tts-1-hd">tts-1-hd</option>
</select>

<select id="voiceSelect">
<option value="alloy">alloy</option>
<option value="echo">echo</option>
<option value="fable">fable</option>
<option value="onyx">onyx</option>
<option value="nova">nova</option>
<option value="shimmer">shimmer</option>
</select>

<input
id="speedInput"
type="number"
value="1"
min="0.25"
max="4"
step="0.1">

</div>

<div class="button-row">

<button
class="make-btn"
onclick="makeSpeech()">
음성 만들기
</button>

<button
class="history-btn"
onclick="loadHistory()">
내 기록 보기
</button>

</div>

<div id="status" class="status"></div>

<audio
id="audioPlayer"
controls>
</audio>
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  signOut,
  onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

import {
  getDatabase,
  ref,
  push,
  get,
  child
}
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

const firebaseConfig = {

  apiKey: "여기에_API_KEY",

  authDomain:
    "realtestcount.firebaseapp.com",

  databaseURL:
    "https://realtestcount-default-rtdb.firebaseio.com",

  projectId:
    "realtestcount",

  storageBucket:
    "realtestcount.firebasestorage.app",

  messagingSenderId:
    "838572880697",

  appId:
    "1:838572880697:web:6326057ff983a5212e6ee8"

};

const app =
  initializeApp(firebaseConfig);

const auth =
  getAuth(app);

const provider =
  new GoogleAuthProvider();

const db =
  getDatabase(app);

window.currentUser = null;

window.login = async function(){

  try{

    const result =
      await signInWithPopup(
        auth,
        provider
      );

    window.currentUser =
      result.user;

  }
  catch(error){

    alert(error.message);

  }

};

window.logout = async function(){

  await signOut(auth);

};

onAuthStateChanged(
  auth,
  (user)=>{

    window.currentUser =
      user;

    const userInfo =
      document.getElementById(
        "userInfo"
      );

    if(user){

      userInfo.innerHTML =
        `
        <b>${user.displayName}</b><br>
        ${user.email}
        `;

    }
    else{

      userInfo.textContent =
        "로그인 필요";

    }

  }
);

window.db = db;

window.ref = ref;

window.push = push;

window.get = get;

window.child = child;

</script>

<script>

const APPS_SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbxq2-jiKzZoS33CTZyqlBBHHX2_va3tFe_oK_CwMe8fwodoYiU9CUx3zpB6Xaziw0-Q6g/exec";

async function makeSpeech(){

  if(!window.currentUser){

    alert(
      "먼저 로그인해주세요."
    );

    return;
  }

  const text =
    document
    .getElementById(
      "textInput"
    )
    .value
    .trim();

  if(!text){

    alert(
      "텍스트를 입력하세요."
    );

    return;
  }

  const model =
    document
    .getElementById(
      "modelSelect"
    )
    .value;

  const voice =
    document
    .getElementById(
      "voiceSelect"
    )
    .value;

  const speed =
    Number(
      document
      .getElementById(
        "speedInput"
      )
      .value
    );

  const status =
    document
    .getElementById(
      "status"
    );

  try{

    status.textContent =
      "음성 생성 중...";
<div id="history" class="history"></div>

</div>
        const response =
      await fetch(
        APPS_SCRIPT_URL,
        {
          method:"POST",
          body:JSON.stringify({
            text:text,
            model:model,
            voice:voice,
            speed:speed
          })
        }
      );

    const result =
      await response.json();

    if(!result.success){

      throw new Error(
        result.error
      );

    }

    const audioUrl =
      "data:audio/mp3;base64," +
      result.audioBase64;

    document
      .getElementById(
        "audioPlayer"
      )
      .src =
      audioUrl;

    await push(

      ref(
        db,
        "ttsHistory"
      ),

      {
        uid:
          currentUser.uid,

        email:
          currentUser.email,

        name:
          currentUser.displayName,

        text:
          text,

        model:
          model,

        voice:
          voice,

        speed:
          speed,

        createdAt:
          new Date()
          .toLocaleString(
            "ko-KR"
          )

      }

    );

    status.textContent =
      "음성 생성 완료 및 저장 완료";

  }
  catch(error){

    console.error(error);

    status.textContent =
      "오류 : " +
      error.message;

  }

}

async function loadHistory(){

  if(!currentUser){

    alert(
      "로그인해주세요."
    );

    return;

  }

  const historyBox =
    document.getElementById(
      "history"
    );

  historyBox.innerHTML =
    "불러오는 중...";

  try{

    const snapshot =
      await get(
        child(
          ref(db),
          "ttsHistory"
        )
      );

    if(!snapshot.exists()){

      historyBox.innerHTML =
        "기록 없음";

      return;

    }

    const data =
      snapshot.val();

    let html = "";

    Object.entries(data)
      .reverse()
      .forEach(([id,item])=>{

      if(
        item.uid !==
        currentUser.uid
      ){
        return;
      }

      html += `
      <div class="item">

        <b>
        ${item.text}
        </b>

        <br><br>

        모델 :
        ${item.model}

        <br>

        음성 :
        ${item.voice}

        <br>

        속도 :
        ${item.speed}

        <div class="item-date">

        ${item.createdAt}

        </div>

      </div>
      `;

    });

    historyBox.innerHTML =
      html || "기록 없음";

  }
  catch(error){

    console.error(error);

    historyBox.innerHTML =
      "불러오기 실패";

  }

}

</script>

</body>
</html>
