<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI TTS 음성 변환기</title>

<style>
body{
  font-family: Arial,sans-serif;
  background:#f5f5f5;
  margin:0;
  padding:30px;
}

.container{
  max-width:800px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 0 10px rgba(0,0,0,.1);
}

h1{
  text-align:center;
}

textarea{
  width:100%;
  height:200px;
  padding:10px;
  font-size:16px;
  border:1px solid #ddd;
  border-radius:10px;
}

select,input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:1px solid #ddd;
  border-radius:10px;
}

button{
  margin-top:15px;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#4285f4;
  color:white;
  cursor:pointer;
}

button:hover{
  opacity:.9;
}

audio{
  width:100%;
  margin-top:20px;
}

.status{
  margin-top:15px;
  color:#555;
}
</style>

</head>
<body>

<div class="container">

<h1>AI TTS 음성 변환기</h1>

<textarea
id="textInput"
placeholder="텍스트를 입력하세요"></textarea>

<select id="modelSelect">
<option value="tts-1">tts-1</option>
<option value="tts-1-hd">tts-1-hd</option>
</select>

<select id="voiceSelect">
<option value="alloy">alloy</option>
<option value="echo">echo</option>
<option value="fable">fable</option>
<option value="onyx">onyx</option>
<option value="nova">nova</option>
<option value="shimmer">shimmer</option>
</select>

<input
id="speedInput"
type="number"
value="1"
step="0.1"
min="0.25"
max="4">

<button onclick="makeSpeech()">
음성 만들기
</button>

<div class="status" id="status"></div>

<audio id="audioPlayer" controls></audio>

</div>

<script>

const APPS_SCRIPT_URL =
'https://script.google.com/macros/s/AKfycbxq2-jiKzZoS33CTZyqlBBHHX2_va3tFe_oK_CwMe8fwodoYiU9CUx3zpB6Xaziw0-Q6g/exec';

async function makeSpeech(){

  const text =
    document.getElementById('textInput').value.trim();

  if(!text){
    alert('텍스트를 입력해주세요.');
    return;
  }

  const model =
    document.getElementById('modelSelect').value;

  const voice =
    document.getElementById('voiceSelect').value;

  const speed =
    Number(document.getElementById('speedInput').value);

  const status =
    document.getElementById('status');

  try{

    status.textContent =
      '음성을 생성하는 중입니다...';

    const response =
      await fetch(APPS_SCRIPT_URL,{
        method:'POST',
        body:JSON.stringify({
          text:text,
          model:model,
          voice:voice,
          speed:speed
        })
      });

    const result =
      await response.json();

    if(!result.success){
      throw new Error(result.error);
    }

    const audioUrl =
      "data:audio/mp3;base64," +
      result.audioBase64;

    document
      .getElementById('audioPlayer')
      .src = audioUrl;

    status.textContent =
      '생성이 완료되었습니다.';

  }
  catch(error){

    console.error(error);

    status.textContent =
      '오류: ' + error.message;
  }
}

</script>

</body>
</html>
